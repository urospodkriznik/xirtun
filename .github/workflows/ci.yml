name: CI

# Lint + tests on every push and PR. Fully offline: the LLM and Telegram layers
# are replaced with fakes, so no API keys or secrets are needed here.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check

      - name: Test
        run: uv run pytest
